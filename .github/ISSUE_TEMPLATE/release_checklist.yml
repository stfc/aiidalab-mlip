name: Release checklist
description: Track release readiness for a milestone
labels:
  - type: release
body:
  - type: input
    id: version
    attributes:
      label: Target version
      placeholder: v0.2.0
    validations:
      required: true
  - type: input
    id: milestone
    attributes:
      label: Milestone
      placeholder: M3 - Reliability, CI/CD, and Beta Release
    validations:
      required: true
  - type: textarea
    id: checklist
    attributes:
      label: Release readiness checklist
      value: |
        - [ ] Milestone scope completed or formally deferred
        - [ ] All critical and high bugs triaged
        - [ ] CI is green on supported matrix
        - [ ] Integration and smoke tests passed
        - [ ] Documentation and migration notes updated
        - [ ] Changelog updated
        - [ ] Version bump and tag prepared
        - [ ] Rollback plan reviewed
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Open risks and mitigations
      placeholder: List unresolved risks and mitigation strategy.
  - type: textarea
    id: signoff
    attributes:
      label: Sign-off
      placeholder: Who approved release readiness?
