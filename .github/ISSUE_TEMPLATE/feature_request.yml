name: Feature request
description: Request a new capability for aiidalab-mlip
labels:
  - type: feature
body:
  - type: markdown
    attributes:
      value: |
        Use this template to propose a feature with clear scope and acceptance criteria.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user problem does this solve?
      placeholder: Describe the user pain point and context.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature and expected behavior.
      placeholder: Explain the user flow and technical behavior.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - ui
        - workflow
        - aiida
        - aiida-mlip-integration
        - results
        - docs
        - ci
        - infra
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - critical
        - high
        - medium
        - low
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List exact conditions that define done.
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies and blockers
      description: Any related issues, dependencies, or blockers.
      placeholder: Link issues with #id and describe blockers.
  - type: textarea
    id: test-plan
    attributes:
      label: Test plan
      description: How should this be validated?
      placeholder: Unit, integration, and manual test expectations.
